name: Config Schema & Regression Tests

# Required check — moet ALTIJD triggeren op PRs naar master.
# Scope-aware: zware tests alleen als trading_bot/ of scripts/ wijzigt.

on:
  push:
    paths:
      - 'trading_bot/**'
      - 'scripts/**'
  pull_request:
    branches: [master]
    # Geen paths filter — required checks moeten altijd runnen.

jobs:
  guardrails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect scope
        id: scope
        run: |
          CHANGED=$(git diff --name-only origin/master...HEAD 2>/dev/null || true)
          BOT=$(echo "$CHANGED" | grep -c "^trading_bot/\|^scripts/" || true)
          echo "bot=$BOT" >> "$GITHUB_OUTPUT"
          echo "Scope: $BOT trading_bot/scripts files changed"

      - name: Set up Python
        if: steps.scope.outputs.bot != '0'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.scope.outputs.bot != '0'
        run: pip install numpy

      - name: Schema check (no legacy tm_bars in active code)
        if: steps.scope.outputs.bot != '0'
        run: python3 scripts/check_cfg_schema.py

      - name: Regression tests (66 param sensitivity tests)
        if: steps.scope.outputs.bot != '0'
        run: |
          cd trading_bot
          if [ -f candle_cache_532.json ]; then
            python3 test_param_sensitivity.py
          else
            echo "⚠️  candle_cache_532.json not in CI — running syntax check"
            python3 -c "
          import ast, sys, pathlib
          errors = 0
          for f in pathlib.Path('.').glob('*.py'):
              try:
                  ast.parse(f.read_text())
              except SyntaxError as e:
                  print(f'SYNTAX ERROR: {f}: {e}')
                  errors += 1
          print(f'Checked {sum(1 for _ in pathlib.Path(\".\").glob(\"*.py\"))} files, {errors} errors')
          sys.exit(1 if errors else 0)
          "
          fi

      - name: Context drift sentinel
        if: steps.scope.outputs.bot != '0'
        run: python3 scripts/check_cfg_schema.py --check-context

      - name: No-op (no trading_bot/scripts changes)
        if: steps.scope.outputs.bot == '0'
        run: echo "✅ No trading_bot/scripts changes — guardrails pass"
