name: Lab Tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'lab/**'
      - 'tests/test_lab/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install pytest
        run: pip install pytest

      - name: Run lab tests
        run: python -m pytest tests/test_lab/ -x -q
